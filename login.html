{% extends 'base.html' %}
{% block auth %}
<div class="login-page">
  <div class="login-box">
    <div class="login-brand">
      <span class="icon">◈</span>
      <h1>EstoqueVestir</h1>
      <p>Controle de estoque para moda</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}" style="margin: 0 0 16px;">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <div class="login-form">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seu@email.com" id="email" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="••••••••" id="senha" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="btn-login">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Entrar
      </button>
    </div>

    <p style="text-align:center;font-size:11.5px;color:var(--muted);margin-top:24px;">
      Acesso restrito · EstoqueVestir by Toiti Sistemas
    </p>
  </div>
</div>

<script>
// Login via JS post to avoid form element issues
document.getElementById('btn-login').addEventListener('click', () => {
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = '/login';
  [['email', email], ['senha', senha]].forEach(([n, v]) => {
    const i = document.createElement('input');
    i.name = n; i.value = v; form.appendChild(i);
  });
  document.body.appendChild(form);
  form.submit();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-login').click();
});
</script>
{% endblock %}
